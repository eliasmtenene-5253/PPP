<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .nav {
            background: #020617;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .nav .home-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav .home-link i {
            font-size: 18px;
        }

        .nav .home-link:hover {
            color: white;
        }

        .nav .course-title {
            flex: 1;
            text-align: center;
            padding: 0 10px;
            min-width: 0;
            word-wrap: break-word;
        }

        /* FILTER */
        .filter-bar {
            text-align: center;
            margin: 20px 15px;
            padding: 12px;
            font-size: 16px;
        }

        select {
            padding: 10px 14px;
            border-radius: 10px;
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            font-size: 16px;
        }

        /* ROW (CARD STYLE) */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            margin: 14px 15px;
            padding: 16px 18px;
            border-radius: 14px;
            gap: 15px;
            min-width: 0;
            transition: 0.2s ease;
        }

        .row:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .left {
            display: flex;
            gap: 25px;
            font-size: 16px;
            flex: 1;
            min-width: 0;
        }

        .view-btn {
            background: #22c55e;
            padding: 10px 18px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
            box-sizing: border-box;
            transition: 0.2s ease;
        }

        .view-btn:hover {
            background: #16a34a;
            transform: scale(1.05);
        }

        /* MESSAGE */
        .message {
            text-align: center;
            margin-top: 60px;
            color: #cbd5f5;
            font-size: 18px;
        }

        /* MOBILE - APP STYLE */
        @media (max-width: 600px) {

            .nav {
                flex-direction: column;
                text-align: center;
                font-size: 20px;
                padding: 18px 16px;
            }

            .nav .course-title {
                font-size: 19px;
                line-height: 1.4;
            }

            .nav .home-link {
                font-size: 18px;
            }

            .nav .home-link i {
                font-size: 22px;
            }

            .filter-bar {
                font-size: 18px;
            }

            select {
                font-size: 17px;
                padding: 12px 16px;
                border-radius: 12px;
            }

            .row {
                flex-direction: column;
                align-items: stretch;
                gap: 14px;
                padding: 18px;
                border-radius: 16px;
            }

            .left {
                flex-direction: column;
                gap: 10px;
                font-size: 18px;
            }

            .view-btn {
                width: 100%;
                text-align: center;
                padding: 16px;
                font-size: 18px;
                border-radius: 12px;
            }

            .message {
                font-size: 20px;
            }

            footer {
                font-size: 16px;
            }
        }

        /* FOOTER */
        footer {
            margin-top: auto;
            background: #020617;
            padding: 18px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
            border-top: 1px solid #1e293b;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="nav">
        <a href="/" class="home-link">
            <i class="fas fa-home"></i> Home
        </a>
        <div class="course-title">
            {{course_name}} ({{course_code}})
        </div>
    </div>

    <!-- FILTER -->
    <div class="filter-bar">
        Filter by Year:
        <select id="year" onchange="filterYear()">
            <option value="">All</option>
            {% for y in range(2021, 2027) %}
            <option value="{{y}}" {% if selected_year==y|string %}selected{% endif %}>
                {{y}}
            </option>
            {% endfor %}
        </select>
    </div>

    <!-- RESULTS -->
    {% if papers and papers|length > 0 %}
        {% for p in papers %}
        <div class="row">
            <div class="left">
                <div>{{p[3]}}</div>
                <div>{{p[4]}}</div>
            </div>
            <a href="/user/view/{{p[0]}}" target="_blank" class="view-btn">
                View
            </a>
        </div>
        {% endfor %}
    {% else %}
        <div class="message">
            <h3>No content for selected year</h3>
        </div>
    {% endif %}

    <!-- FOOTER -->
    <footer>
        © 2025 Introduction to Web Programming
    </footer>

    <script>
        function filterYear(){
            let year = document.getElementById("year").value;
            let url = new URL(window.location.href);
            url.searchParams.set("year", year);
            window.location.href = url.toString();
        }
    </script>

</body>
</html>
